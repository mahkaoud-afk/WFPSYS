<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة المستفيدين - مزامنة فورية</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  padding:20px;
  font-family:'Segoe UI',Arial;
}
.container{max-width:1400px;margin:auto;}
.header{
  background:#fff;
  padding:20px;
  border-radius:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:15px;
  margin-bottom:20px;
}
.stats{display:flex;gap:15px;}
.stat-card{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  padding:12px 25px;
  border-radius:15px;
}
.employee-selector{
  display:flex;
  align-items:center;
  gap:10px;
  background:#f0f0f0;
  padding:8px 20px;
  border-radius:50px;
}
.employee-selector select{
  padding:8px;
  border-radius:20px;
}
.current-badge{
  background:#4CAF50;
  color:#fff;
  padding:6px 18px;
  border-radius:20px;
}
.reset-btn{
  background:#f44336;
  color:#fff;
  border:none;
  padding:10px 25px;
  border-radius:20px;
  cursor:pointer;
}
.employees-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}
.employee-card{
  background:#fff;
  padding:20px;
  border-radius:20px;
}
.employee-card.active{
  border:3px solid #4CAF50;
}
.employee-name{
  font-size:22px;
  text-align:center;
  margin-bottom:15px;
}
.numbers{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}
.number-box{
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#f5f5f5;
}
.call-button{
  width:100%;
  padding:12px;
  background:#667eea;
  color:#fff;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>🏪 نظام إدارة المستفيدين</h2>

  <div class="stats">
    <div class="stat-card">تم: <span id="totalServed">0</span></div>
    <div class="stat-card">التالي: <span id="nextNumber">1</span></div>
  </div>

  <div class="employee-selector">
    👤
    <select id="employeeSelect">
      <option value="0">محمد</option>
      <option value="1">أمل</option>
      <option value="2">خالد</option>
      <option value="3">ريم</option>
      <option value="4">حسن</option>
      <option value="5">نور</option>
      <option value="6">عمر</option>
    </select>
    <div class="current-badge" id="currentBadge">محمد</div>
  </div>

  <button class="reset-btn" id="resetBtn">🔄 إعادة ضبط</button>
</div>

<div id="employeesGrid"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------------- بيانات ----------------
const EMPLOYEE_NAMES = ["محمد","أمل","خالد","ريم","حسن","نور","عمر"];

let currentEmployeeId = parseInt(localStorage.getItem("emp")) || 0;

let systemData = {
  nextNumber: 1,
  totalServed: 0,
  currentCustomer: Array(7).fill(null),
  lastCustomer: Array(7).fill(null)
};

// ---------------- حفظ ----------------
async function save() {
  await setDoc(doc(db,"system","state"), systemData);
}

// ---------------- تحميل ----------------
onSnapshot(doc(db,"system","state"), (snap)=>{
  if(snap.exists()){
    systemData = snap.data();
    render();
  }
});

// ---------------- طلب رقم ----------------
window.requestCustomer = async function(empId){

  if(empId !== currentEmployeeId){
    alert("أنت موظف آخر");
    return;
  }

  systemData.lastCustomer[empId] = systemData.currentCustomer[empId];
  systemData.currentCustomer[empId] = systemData.nextNumber;
  systemData.nextNumber++;
  systemData.totalServed++;

  await save();
};

// ---------------- إعادة ضبط بكلمة سر ----------------
document.getElementById("resetBtn").onclick = async () => {

  const pass = prompt("🔐 أدخل كلمة السر:");

  if(pass !== "2021"){
    alert("❌ كلمة السر خطأ");
    return;
  }

  systemData = {
    nextNumber: 1,
    totalServed: 0,
    currentCustomer: Array(7).fill(null),
    lastCustomer: Array(7).fill(null)
  };

  await save();
  alert("✅ تم التصفير");
};

// ---------------- عرض ----------------
function render(){

  document.getElementById("totalServed").innerText = systemData.totalServed;
  document.getElementById("nextNumber").innerText = systemData.nextNumber;

  let html = "";

  EMPLOYEE_NAMES.forEach((name,i)=>{

    let current = systemData.currentCustomer[i];
    let last = systemData.lastCustomer[i];

    html += `
      <div class="employee-card ${i==currentEmployeeId?'active':''}">
        <div class="employee-name">${name}</div>

        <div class="numbers">
          <div class="number-box">السابق<br>${last ?? "-"}</div>
          <div class="number-box">الحالي<br>${current ?? "⚡"}</div>
          <div class="number-box">التالي<br>${systemData.nextNumber}</div>
        </div>

        <button class="call-button" onclick="requestCustomer(${i})">
          طلب زبون
        </button>
      </div>
    `;
  });

  document.getElementById("employeesGrid").innerHTML = html;
}

// ---------------- تغيير الموظف ----------------
document.getElementById("employeeSelect").onchange = (e)=>{
  currentEmployeeId = +e.target.value;
  localStorage.setItem("emp", currentEmployeeId);
  document.getElementById("currentBadge").innerText = EMPLOYEE_NAMES[currentEmployeeId];
  render();
};

// تشغيل أولي
render();
</script>

</body>
</html>
